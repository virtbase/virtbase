name: Bug report
description: Create a bug report
labels:
  - bug
  - unconfirmed
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        **Please note:**
        1. General usage questions are not bug reports. If you're looking for support, you can consider asking for help on [GitHub discussions](https://github.com/virtbase/virtbase/discussions) instead.
        2. If your bug report is related to the installation of Virtbase please include a reproduction of the issue.
  - type: textarea
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    attributes:
      label: Reproduction URL
    validations:
      required: false
  - type: textarea
    attributes:
      label: Reproduction description
      description: Describe how the issue can be observed.
      value: |
        Steps to reproduce:
        1. Go to …
        2. Click on …
        3. See error: …
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behaviour
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true