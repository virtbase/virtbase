name: "virtbase-dev"
services:
  novnc-proxy:
    build:
      context: .
      dockerfile: apps/novnc-proxy/Dockerfile
    ports:
      - ${PORT:-8443}:${PORT:-8443}
    environment:
      - NOVNC_PROXY_SECRET=${NOVNC_PROXY_SECRET}
    env_file:
      - .env
    restart: always
  postgres:
    image: postgres:16-alpine
    command: '-d 1' # set debug-level
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=virtbase
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
  neon-proxy:
    image: ghcr.io/timowilhelm/local-neon-http-proxy:main
    restart: unless-stopped
    environment:
      - PG_CONNECTION_STRING=postgres://postgres:password@postgres:5432/virtbase
    ports:
      - '4444:4444'
    depends_on:
      postgres:
        condition: service_healthy
  redis:
    image: redis:latest
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 5
  # See: https://upstash.com/docs/redis/sdks/ts/developing
  serverless-redis-http:
    ports:
      - "8079:80"
    image: hiett/serverless-redis-http:latest
    depends_on:
      redis:
        condition: service_healthy
    environment:
      SRH_MODE: env
      SRH_TOKEN: example_token
      SRH_CONNECTION_STRING: "redis://redis:6379" # Using `redis` hostname since they're in the same Docker network.
volumes:
  postgres-data:
